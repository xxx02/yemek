<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Günlük Yemek Menüsü</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fdfdfd;
            color: #333;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            height: 100vh;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        .wrapper {
            width: 100%;
            padding: 0px;
        }
        .menu-container {
            display: flex;
            flex-direction: column;
            font-size: 18px;
            text-align: left;
        }
        .menu-title {
            color: #d35400; /* Hafif turuncu başlık rengi */
            margin-bottom: 2px;
            margin-left: 5px;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #eee;
            padding-bottom: 2px;
            display: inline-block;
        }
        .menu-item {
            position: relative;
            padding-left: 25px;
            margin-bottom: 2px;
            line-height: 1.4;
            font-weight: 500;
        }
        .menu-item::before {
            content: "🔸";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8em;
        }
        .no-menu {
            color: #7f8c8d;
            font-style: italic;
            padding: 10px;
        }

        @media (max-width: 600px) {
            .menu-container { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="menu-container" id="menu"></div>
    </div>

    <script>
        const menus = {
        	"Monday": ["Yayla Çorbası", "Etli Kuru Fasulye", "Pirinç Pilavı", "Cacık"],
        	"Tuesday": ["Köylü Çorbası", "Kıymali Bezelye", "Erişte", "Yoğurt"],
        	"Wednesday": ["Ezogelin Çorbası", "Bulgur Pilavı", "Sebzeli Tavuk", "Salata"],
        	"Thursday": ["Tavuksuyu Çorbası", "Ispanak", "Spagetti", "Yoğurt"],
        	"Friday": ["Mercimek Çorbası", "Orman Kebabı", "Pirinç Pilavı", "Ayran"]
        };
        
        // Tarayıcı dilinden bağımsız olarak İngilizce gün ismini al (Veri eşleşmesi için)
        const todayKey = new Date().toLocaleDateString("en-US", { weekday: "long" });
        // Ekrana yazdırmak için Türkçe gün ismini al
        const todayTr = new Date().toLocaleDateString("tr-TR", { weekday: "long" });
        
        const menuDiv = document.getElementById("menu");

        if (menus[todayKey]) {
            const listItems = menus[todayKey].map(item => `<div class="menu-item">${item}</div>`).join("");
            
            menuDiv.innerHTML = `
                <h3 class="menu-title">${todayTr} Menüsü</h3>
                ${listItems}
            `;
        } else {
            menuDiv.innerHTML = `
                <h3 class="menu-title">${todayTr}</h3>
                <div class="no-menu">Bugün yemek servisi bulunmamaktadır.</div>
            `;
        }
    </script>
</body>
</html>
