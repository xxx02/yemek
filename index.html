<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: white;
            color: black;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            height: 100vh;
        }
        .wrapper {
            height: auto; /* Kayma yoksa otomatik yüksekliğe izin verelim */
            padding: 5px;
        }
        .marquee {
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
            font-size: 18px;
            text-align: left;
            padding-left: 0px;
        }
        .marquee div {
            position: relative;
            padding-left: 20px;
            margin-bottom: 5px;
        }
        .marquee div::before {
            content: "🔸";
            position: absolute;
            left: 0;
            top: 40%;
            transform: translateY(-50%);
        }

        @media (max-width: 600px) {
            .marquee {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="marquee" id="menu"></div>
    </div>

    <script>
        const menus = {
        	"Monday": ["Yayla Çorbası", "Nohut", "Pirinç  Pilav", "Cacık"],
        	"Tuesday": ["Ezogelin Çorbası", "Patates Oturtma", "Bulgur Pilavı", "Vişne Komposto"],
        	"Wednesday": ["Düğün Çorbası", "Tavuklu Kapuska ", "Erişte", "Ayran"],
        	"Thursday": ["Tel Şehriye Çorbası", "Etli Kuru Fasulye", "Bulgur Pilavı", "Cacık"],
        	"Friday": ["Mercimek Çorbası", "Orman Kebabı", "Pirinç Pilavı", "Ayran"]
        };
        
        const today = new Date().toLocaleDateString("en-US", { weekday: "long" });
        const todayTr = new Date().toLocaleDateString("tr-TR", { weekday: "long" });
        const menuDiv = document.getElementById("menu");

        if (menus[today]) {
            menuDiv.innerHTML = `<h style="font-weight: bold; margin-bottom: 5px; margin-left: 8px">${todayTr} Menüsü</h>` +
                menus[today].map(item => `<div>${item}</div>`).join("");
        } else {
            menuDiv.innerHTML = "<div>Bugün için menü bulunmamaktadır</div>";
        }
    </script>
</body>
</html>
